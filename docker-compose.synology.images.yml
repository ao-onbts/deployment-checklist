services:
  versiontrack-db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-versiontrack}
      POSTGRES_USER: ${POSTGRES_USER:-versiontrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - versiontrack-db-data:/var/lib/postgresql/data

  versiontrack-migrator:
    image: ${MIGRATOR_IMAGE}:${IMAGE_TAG:-latest}
    restart: "no"
    command: ["ensure-schema"]
    environment:
      Storage__Provider: Postgres
      ConnectionStrings__Postgres: Host=versiontrack-db;Port=5432;Database=${POSTGRES_DB:-versiontrack};Username=${POSTGRES_USER:-versiontrack};Password=${POSTGRES_PASSWORD:-change-this-db-password}
    depends_on:
      versiontrack-db:
        condition: service_healthy

  versiontrack-api:
    image: ${API_IMAGE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      Storage__Provider: Postgres
      Storage__EnsureCreatedOnStartup: "false"
      Storage__SeedDataOnStartup: "false"
      ConnectionStrings__Postgres: Host=versiontrack-db;Port=5432;Database=${POSTGRES_DB:-versiontrack};Username=${POSTGRES_USER:-versiontrack};Password=${POSTGRES_PASSWORD:-change-this-db-password}
      Ingestion__RequireApiKey: ${VERSIONTRACK_INGESTION_REQUIRE_API_KEY:-true}
      Ingestion__ApiKey: ${VERSIONTRACK_INGESTION_API_KEY:-change-this-ingestion-key}
      Cors__AllowedOrigins__0: ${SITE_ORIGIN:-http://localhost:8089}
      VERSIONTRACK_ADO_PAT: ${VERSIONTRACK_ADO_PAT:-}
      VERSIONTRACK_ADO_ORCHESTRATOR_PIPELINE_ID: ${VERSIONTRACK_ADO_ORCHESTRATOR_PIPELINE_ID:-}
      VERSIONTRACK_ADO_PROVISION_PIPELINE_ID: ${VERSIONTRACK_ADO_PROVISION_PIPELINE_ID:-}
      Ado__ConfigRepoOrganizationUrl: ${VERSIONTRACK_ADO_ORGANIZATION_URL:-https://dev.azure.com/ONBSW}
      Ado__ConfigRepoProject: ${VERSIONTRACK_ADO_PROJECT:-IssuTrax.Manifest}
      Ado__DefaultBranchName: ${VERSIONTRACK_ADO_REPO_BRANCH:-Andreas/3-node-deployment}
      Ado__BootstrapPipelines__orchestrator__DefinitionId: ${VERSIONTRACK_ADO_ORCHESTRATOR_PIPELINE_ID:-293}
      Ado__BootstrapPipelines__provisioning__DefinitionId: ${VERSIONTRACK_ADO_PROVISION_PIPELINE_ID:-260}
    expose:
      - "8080"
    depends_on:
      versiontrack-db:
        condition: service_healthy

  versiontrack-ui:
    image: ${UI_IMAGE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      VERSIONTRACK_API_BASE_URL: ${VERSIONTRACK_API_BASE_URL:-/api}
      VERSIONTRACK_ENVIRONMENT_LABEL: ${VERSIONTRACK_ENVIRONMENT_LABEL:-Synology}
    depends_on:
      - versiontrack-api
    ports:
      - "${UI_PORT:-8089}:8080"

volumes:
  versiontrack-db-data:

